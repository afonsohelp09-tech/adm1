<!DOCTYPE html>
<html lang="pt-PT" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<meta name="theme-color" content="#0b0a09" id="metaThemeColor"/>
<title>AZAVISION — Admin ERP</title>
<script>
(function(){
  var k='azav_admin_theme',s=localStorage.getItem(k);
  if(s!=='light'&&s!=='dark')s=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
  document.documentElement.setAttribute('data-theme',s);
  var m=document.querySelector('meta[name="theme-color"]');
  if(m)m.setAttribute('content',s==='light'?'#f5f3ef':'#0b0a09');
})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="dark"]{
  --gold:#c9a96e;--gold-lt:#e8d4a8;--bg:#0b0a09;--bg-card:#161514;--bg-modal:#121110;--bg-panel:#1c1a18;
  --border:rgba(201,168,76,.2);--border-hard:#3a3632;--text:#faf8f4;--text-body:#e6e2da;--muted:#d4cec4;--muted2:#b8b2a8;
  --nav-bg:rgba(11,10,9,.96);--overlay:rgba(0,0,0,.65);--overlay-modal:rgba(0,0,0,.78);--danger:#f87171;--on-gold:#0b0a09;
  --input-bg:#161514;--placeholder:#c4beb4;
  --seg-bg:rgba(255,255,255,.09);--seg-border:rgba(255,255,255,.18);--seg-muted:#ece6dc;--seg-hover:rgba(255,255,255,.12);
  --table-head-bg:rgba(255,255,255,.06);--thumb-empty-bg:rgba(255,255,255,.06);
  --api-banner-bg:#2a1a0a;--api-banner-text:var(--gold-lt);
  --logo-filter:drop-shadow(0 1px 10px rgba(189,160,97,.35)) brightness(1.12);
  --badge-pub-bg:#052e16;--badge-pub-text:#86efac;--badge-pub-border:#166534;
  --badge-sched-bg:#2a2210;--badge-sched-text:#e8d4a8;--badge-draft-bg:#2a2826;--badge-draft-text:#d4cec4;
  color-scheme:dark;
}
[data-theme="light"]{
  --gold:#8a6b30;--gold-lt:#6b5228;--bg:#f5f3ef;--bg-card:#ffffff;--bg-modal:#ffffff;--bg-panel:#f0ebe3;
  --border:rgba(154,123,60,.28);--border-hard:#c8c0b4;--text:#0c0b0a;--text-body:#2a2622;--muted:#403a34;--muted2:#5c5650;
  --nav-bg:rgba(245,243,239,.97);--overlay:rgba(28,25,22,.35);--overlay-modal:rgba(28,25,22,.5);--danger:#b91c1c;--on-gold:#fff;
  --input-bg:#ffffff;--placeholder:#5c5650;
  --seg-bg:#ebe6dc;--seg-border:#c0b8ac;--seg-muted:#2a2622;--seg-hover:rgba(28,25,22,.08);
  --table-head-bg:rgba(28,25,22,.07);--thumb-empty-bg:rgba(28,25,22,.06);
  --api-banner-bg:#faf3e4;--api-banner-text:#5a4218;
  --logo-filter:drop-shadow(0 2px 12px rgba(100,75,30,.25)) contrast(1.05);
  --badge-pub-bg:#ecfdf3;--badge-pub-text:#14532d;--badge-pub-border:#86efac;
  --badge-sched-bg:#faf3e4;--badge-sched-text:#6b5228;--badge-draft-bg:#ece8e0;--badge-draft-text:#403a34;
  color-scheme:light;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;transition:background .25s,color .25s;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.5;
}
body.scroll-lock{overflow:hidden;position:fixed;width:100%}
/* Lisibilité texte — modes clair & sombre */
input,textarea,select,button{font-family:inherit}
input,textarea,select{color:var(--text);background:var(--input-bg)}
input::placeholder,textarea::placeholder{color:var(--placeholder);opacity:1}
.data-table td,.check-row,.top-title,.login-card h1{color:var(--text)}
.data-table th,.field label,.kpi-lbl,.hint-block,.wizard-sub,.row-meta,.loading-msg,.muted{color:var(--text-body)}
.nav-item{color:var(--text-body)}
.nav-item:hover,.nav-item.on{color:var(--text)}
.tab{color:var(--text-body)}
.tab.on{color:var(--on-gold)}
.btn-ghost{color:var(--text-body)}
.btn-ghost:hover{color:var(--text);border-color:var(--gold)}
.search-in,.select-in{background:var(--input-bg);color:var(--text)}
.field input,.field textarea,.field select{background:var(--input-bg)}
.pw-card-body p,.order-lines,.alert-list{color:var(--text-body)}
.pw-card-body strong{color:var(--gold)}
.size-badge{color:var(--text-body)}
.size-badge.on{color:var(--gold-lt)}
[data-theme="light"] .size-badge.on{color:var(--gold)}
.mob-bar button{color:var(--text-body)}
.mob-bar button.on{color:var(--gold)}
/* Lisibilité renforcée — clair & sombre */
.data-table td,.check-row,.top-title,.login-card h1,.nav-item{color:var(--text)}
.alert-list,.order-lines,.hero-preview.empty,.pw-card-empty,.pw-variant-count,
.drive-info,.prod-thumb.empty,.upload-placeholder,.btn-ghost{color:var(--text-body)}
.tab:not(.on){color:var(--text-body);border-color:var(--border-hard)}
.data-table th{background:var(--table-head-bg);color:var(--text-body);font-weight:600}
.user-pill{color:var(--text-body)}
.lang-switch button:not(.on),.theme-switch button:not(.on){color:var(--seg-muted)}
.api-banner,.api-warn{color:var(--api-banner-text)}
.badge-draft{background:var(--badge-draft-bg);color:var(--badge-draft-text);border-color:var(--border-hard)}
.badge-sched{background:var(--badge-sched-bg);color:var(--badge-sched-text);border-color:var(--gold)}
.bulk-bar span{color:var(--gold-lt)}
.pw-card-body p,.drive-info code{color:var(--text-body)}
.drive-info code{background:var(--seg-hover)}
.field select option{background:var(--bg-card);color:var(--text)}
.modal-inner h2,.panel h2,.wizard-section h3{color:var(--gold-lt)}
[data-theme="light"] .modal-inner h2,
[data-theme="light"] .panel h2,
[data-theme="light"] .wizard-section h3{color:var(--gold)}
.upload-ico{opacity:.88}
/* Icônes SVG & logos (clair + sombre) */
.ui-ico,.nav-item .nav-ico svg,.mob-bar .mob-ico svg,.menu-btn svg,.theme-switch button svg{
  display:block;flex-shrink:0;stroke:currentColor;fill:none;color:inherit;vector-effect:non-scaling-stroke;
}
.nav-item .nav-ico{display:flex;align-items:center;justify-content:center;width:22px;height:22px;color:var(--gold);flex-shrink:0}
.nav-item .nav-ico svg{width:18px;height:18px;stroke-width:1.75}
.mob-bar .mob-ico{display:flex;align-items:center;justify-content:center;height:22px;color:var(--gold)}
.mob-bar .mob-ico svg{width:20px;height:20px;stroke-width:1.75}
.mob-bar button.on .mob-ico svg{color:inherit}
.logo-fallback-text{display:none;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600}
.sidebar-head.logo-missing img,.login-wrap.logo-missing .login-logo{display:none!important}
.sidebar-head.logo-missing .logo-fallback-text,.login-wrap.logo-missing .logo-fallback-text{display:inline!important}
.login-wrap.logo-missing .logo-fallback-text{display:block!important;margin-bottom:20px;font-size:14px;letter-spacing:4px}
.sidebar-head img,.login-logo{opacity:1;visibility:visible;filter:var(--logo-filter)}
.mob-bar button{color:var(--text-body)}
[data-theme="dark"] .mob-bar button.on{color:var(--gold-lt)}
[data-theme="light"] .mob-bar button.on{color:var(--gold)}
[data-theme="dark"] .api-banner,[data-theme="dark"] .api-warn{color:var(--gold-lt)}
.tab.on{color:var(--on-gold)}
.nav-item:hover,.nav-item.on{color:var(--text)}
#app{min-height:100vh;min-height:100dvh}
.api-banner{
  background:var(--api-banner-bg);border-bottom:1px solid var(--gold);
  color:var(--api-banner-text);font-size:10px;padding:10px 20px;text-align:center;line-height:1.6;
}
.api-banner code{background:var(--seg-hover);padding:2px 6px;border-radius:3px;font-size:9px}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.login-card{width:100%;max-width:400px;background:var(--bg-card);border:1px solid var(--border-hard);border-radius:6px;padding:32px 28px}
.login-logo{height:40px;margin-bottom:20px;display:block;object-fit:contain;filter:var(--logo-filter)}
.login-theme-row{display:flex;justify-content:center;margin-top:14px}
.login-card h1{font-size:18px;font-weight:600;margin-bottom:20px;letter-spacing:1px}
.api-warn{font-size:11px;color:var(--gold);margin-bottom:16px;line-height:1.6}
.lang-row{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.lang-switch,.theme-switch{display:inline-flex;align-items:stretch;gap:2px;background:var(--seg-bg);border:1px solid var(--seg-border);border-radius:999px;padding:3px}
.lang-switch button,.theme-switch button{display:inline-flex;align-items:center;justify-content:center;gap:5px;background:transparent;border:none;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;color:var(--seg-muted);padding:6px 10px;border-radius:999px;min-height:32px;transition:background .2s,color .2s,box-shadow .2s}
.lang-switch button{min-width:34px;padding:6px 8px}
.theme-switch button svg{width:15px;height:15px;flex-shrink:0;stroke-width:1.75}
.theme-switch .theme-lbl{display:none}
@media(min-width:900px){.theme-switch .theme-lbl{display:inline}}
.lang-switch button.on,.theme-switch button.on{background:var(--gold);color:var(--on-gold);box-shadow:0 1px 6px rgba(0,0,0,.15)}
.lang-switch button:not(.on):hover,.theme-switch button:not(.on):hover{color:var(--text);background:var(--seg-hover)}
.lang-pill{background:none;border:1px solid var(--border-hard);color:var(--muted);padding:6px 10px;font-size:10px;cursor:pointer;border-radius:3px}
.lang-pill.on{background:var(--gold);color:var(--on-gold);border-color:var(--gold)}

/* Shell */
.admin-shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg-card);border-right:1px solid var(--border-hard);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;padding-top:env(safe-area-inset-top,0)}
.sidebar-head{padding:20px 18px;border-bottom:1px solid var(--border-hard);display:flex;align-items:center;gap:10px}
.sidebar-head img{height:32px;object-fit:contain;filter:var(--logo-filter)}
.sidebar-head span{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;padding:12px 14px;border-radius:4px;cursor:pointer;font-size:12px;min-height:44px;font-weight:500;color:var(--text-body);transition:background .2s,color .2s,box-shadow .2s}
.nav-item .nav-ico{color:var(--gold);opacity:.85;transition:opacity .2s,color .2s}
.nav-item .nav-lbl{flex:1;line-height:1.3}
.nav-item:hover{background:rgba(189,160,97,.1);color:var(--text)}
.nav-item:hover .nav-ico{opacity:1}
.nav-item.on{background:rgba(189,160,97,.2);color:var(--text);font-weight:600;box-shadow:inset 3px 0 0 var(--gold)}
.nav-item.on .nav-ico{color:var(--gold-lt);opacity:1}
[data-theme="light"] .nav-item.on .nav-ico{color:var(--gold)}
.nav-item.logout{margin:12px;color:var(--danger);border-top:1px solid var(--border-hard);border-radius:0}
.sidebar-overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:190}
.sidebar-overlay.open{display:block}
.main-col{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;padding-top:max(12px,env(safe-area-inset-top,12px))}
.menu-btn{display:none;background:none;border:none;color:var(--text);padding:10px;min-width:44px;min-height:44px;cursor:pointer}
.top-title{font-size:16px;font-weight:600;flex:1}
.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.user-pill{font-size:11px;color:var(--text-body);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-right .lang-switch button{font-size:9px}
.menu-btn svg{width:22px;height:22px;stroke-width:1.75}
.main{padding:20px;flex:1;padding-bottom:calc(20px + env(safe-area-inset-bottom,0))}
.loading-msg{text-align:center;color:var(--muted);padding:40px;font-size:12px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--bg-card);border:1px solid var(--border-hard);border-radius:4px;padding:16px}
.kpi-lbl{display:block;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-body);margin-bottom:6px}
.kpi-val{font-size:20px;color:var(--gold)}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--bg-card);border:1px solid var(--border-hard);border-radius:4px;padding:16px}
.panel h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:12px}

/* Tables & forms */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
.toolbar .btn-primary{margin-left:auto}
.tabs{display:flex;gap:4px}
.tab{background:none;border:1px solid var(--border-hard);padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;border-radius:3px;min-height:40px}
.tab.on{background:var(--gold);color:var(--on-gold);border-color:var(--gold)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border-hard);border-radius:4px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th,.data-table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border-hard)}
.data-table th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-body);background:var(--table-head-bg);font-weight:600}
.data-table tr:last-child td{border-bottom:none}
.data-table .actions{white-space:nowrap}
.muted{color:var(--muted);text-align:center;padding:20px}
.hint-block{font-size:11px;color:var(--text-body);margin-bottom:16px;line-height:1.6}
.search-in,.select-in{background:var(--bg-card);border:1px solid var(--border-hard);color:var(--text);padding:10px 12px;border-radius:3px;font-size:14px;min-height:44px}
.search-in{flex:1;min-width:140px;max-width:280px}
.select-in{cursor:pointer}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;color:var(--text-body)}
.field input,.field textarea,.field select{background:var(--bg-card);border:1px solid var(--border-hard);color:var(--text);padding:11px 12px;border-radius:3px;font-size:14px;width:100%}
.field-help{font-size:11px;color:var(--text-body);line-height:1.5;margin-top:4px}
.color-field{display:grid;grid-template-columns:56px 1fr;gap:10px;align-items:center}
.color-picker{appearance:none;-webkit-appearance:none;width:56px;height:44px;padding:4px!important;border-radius:4px;border:1px solid var(--border-hard);background:var(--bg-card);cursor:pointer}
.color-picker::-webkit-color-swatch-wrapper{padding:0}
.color-picker::-webkit-color-swatch{border:none;border-radius:2px}
.color-picker::-moz-color-swatch{border:none;border-radius:2px}
.field textarea{min-height:80px;resize:vertical}
.field textarea#of_notes{min-height:56px}
.ord-table .badge{white-space:normal;max-width:140px;line-height:1.35}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:10px;cursor:pointer;min-height:44px}
.config-form .panel{margin-bottom:16px}
.lang-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.hero-preview{margin:8px 0 12px;border-radius:4px;overflow:hidden;border:1px solid var(--border-hard);max-height:200px;background:var(--thumb-empty-bg)}
.hero-preview img{width:100%;height:auto;max-height:200px;object-fit:cover;display:block}
.hero-preview.empty{min-height:100px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted)}
.logo-preview{max-height:none;min-height:120px;display:flex;align-items:center;justify-content:center;padding:16px}
.logo-preview img{width:auto;max-width:100%;max-height:84px;object-fit:contain}
.field input[type=file]{padding:8px;font-size:12px;cursor:pointer}
.btn-primary,.btn-ghost,.btn-sm{background:var(--gold);color:var(--on-gold);border:none;padding:12px 18px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:3px;min-height:44px}
.btn-primary.wide{width:100%;margin-top:8px}
.btn-ghost{background:transparent;color:var(--text-body);border:1px solid var(--border-hard)}
.btn-sm{padding:8px 12px;font-size:10px;min-height:36px;margin-right:4px}
.btn-sm.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.alert-list{list-style:none;font-size:11px;color:var(--text-body)}
.alert-list li{padding:6px 0;border-bottom:1px solid var(--border-hard)}
.order-lines{list-style:none;font-size:11px;color:var(--text-body);margin:12px 0;padding:0}
.order-lines li{padding:4px 0}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:300;background:var(--overlay-modal);display:none;align-items:flex-end;justify-content:center;padding:0}
.modal-bg.open{display:flex}
.modal-panel{background:var(--bg-modal);border:1px solid var(--border-hard);width:100%;max-width:560px;max-height:92vh;max-height:92dvh;overflow-y:auto;border-radius:8px 8px 0 0;padding:0;-webkit-overflow-scrolling:touch}
.modal-bg.wizard-bg .modal-panel,.modal-panel.wizard-panel{max-width:720px}
.modal-coupon .panel{margin-bottom:0;padding:12px}
.modal-inner{padding:24px 20px calc(24px + env(safe-area-inset-bottom,0))}
.modal-inner h2{font-size:16px;margin-bottom:16px;color:var(--gold)}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}
.modal-actions .btn-primary,.modal-actions .btn-ghost{flex:1;min-width:120px}

/* Mobile bar */
.mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--nav-bg);border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom,0));justify-content:space-around}
.mob-bar button{flex:1;background:none;border:none;font-size:9px;font-weight:600;text-transform:uppercase;padding:6px 2px;min-height:48px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text-body);transition:color .2s}
.mob-bar button .mob-ico{color:var(--gold);opacity:.75;transition:opacity .2s,color .2s}
.mob-bar button.on{color:var(--gold);font-weight:700}
.mob-bar button.on .mob-ico{opacity:1;color:inherit}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;padding:12px 20px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid;max-width:90vw;text-align:center}
.toast.hide{opacity:0;pointer-events:none;transition:opacity .3s}
.toast.s{background:#052e16;color:#bbf7d0;border-color:#166534}
.toast.e{background:#2a0a0a;color:#fca5a5;border-color:#991b1b}
.toast.i{background:#1c1407;color:var(--gold-lt);border-color:var(--gold)}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .main-col{margin-left:0}
  .menu-btn{display:flex;align-items:center;justify-content:center}
  .mob-bar{display:flex}
  .main{padding-bottom:calc(72px + env(safe-area-inset-bottom,0))}
  .panel-grid{grid-template-columns:1fr}
  .fgrid{grid-template-columns:1fr}
  .toolbar .btn-primary{margin-left:0;width:100%}
}
@media(min-width:901px){
  .modal-bg{align-items:center;padding:16px}
  .modal-panel{border-radius:6px;max-height:88vh}
}

/* Product wizard (catalog-style) */
.modal-panel.wizard-panel{max-width:1100px;width:100%}
.modal-bg.wizard-bg{align-items:stretch;padding:0}
@media(min-width:901px){.modal-bg.wizard-bg{align-items:center;padding:12px}}
.wizard-inner{padding:20px 16px calc(20px + env(safe-area-inset-bottom,0))}
.wizard-head h2{margin-bottom:4px}
.wizard-sub{font-size:11px;color:var(--text-body);margin-bottom:16px;line-height:1.5}
.wizard-grid{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:900px){.wizard-grid{grid-template-columns:1fr 280px}}
.wizard-section{margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.wizard-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:10px}
.upload-zone{position:relative;border:2px dashed var(--border-hard);border-radius:8px;padding:20px;text-align:center;cursor:pointer;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:border-color .2s}
.upload-zone.drag,.upload-zone:hover{border-color:var(--gold)}
.upload-zone.has-image .upload-placeholder{display:none}
.upload-preview{max-height:160px;max-width:100%;object-fit:contain;border-radius:4px}
.upload-placeholder{display:flex;flex-direction:column;align-items:center;gap:4px}
.upload-ico{font-size:28px;opacity:.6}
.upload-clear{margin-top:8px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.size-badges,.color-swatches{display:flex;flex-wrap:wrap;gap:8px}
.size-badge{padding:6px 12px;border:1px solid var(--border-hard);border-radius:4px;background:transparent;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.size-badge.on{border-color:var(--gold);background:rgba(189,160,97,.18)}
.color-swatch{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;flex-shrink:0;padding:0}
.color-swatch.border-swatch{box-shadow:inset 0 0 0 1px rgba(255,255,255,.2),0 0 0 1px var(--border-hard)}
.color-swatch.on{outline:2px solid var(--gold);outline-offset:2px}
.swatch-check{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;text-shadow:0 0 2px #000}
.custom-color-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.custom-color-row input[type=color]{width:40px;height:36px;padding:2px;border:1px solid var(--border-hard);border-radius:4px;background:transparent;cursor:pointer}
.custom-color-row input[type=text]{flex:1;min-width:100px}
.drive-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;max-height:180px;overflow-y:auto}
.pw-product-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;margin-bottom:12px}
.pw-g-item{position:relative;border:1px solid var(--border-hard);border-radius:6px;overflow:hidden;background:var(--bg-panel);aspect-ratio:3/4}
.pw-g-item.is-main{border-color:var(--gold);box-shadow:0 0 0 1px rgba(189,160,97,.35)}
.pw-g-item img{width:100%;height:100%;object-fit:cover;display:block}
.pw-g-main{position:absolute;top:4px;left:4px;z-index:2;font-size:8px;font-weight:700;background:rgba(189,160,97,.92);color:#111;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.pw-g-actions{position:absolute;bottom:0;left:0;right:0;display:flex;gap:4px;justify-content:center;padding:4px;background:linear-gradient(transparent,rgba(0,0,0,.75))}
.pw-g-actions .btn-sm{padding:2px 6px;font-size:10px;min-width:24px}
.btn-danger-sm{background:rgba(180,40,40,.85);border-color:#a03030;color:#fff}
.pw-upload-add{min-height:100px;margin-bottom:10px}
.pw-url-add{margin-top:4px}
.hint-block{font-size:10px;color:var(--text-body);margin:-4px 0 10px;line-height:1.45}
.drive-thumb{position:relative;border:1px solid var(--border);border-radius:4px;padding:0;overflow:hidden;cursor:pointer;background:var(--bg-panel);aspect-ratio:1}
.drive-thumb:hover{border-color:var(--gold)}
.drive-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.drive-thumb-meta{position:absolute;bottom:0;left:0;right:0;font-size:7px;background:rgba(0,0,0,.7);color:#fff;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wizard-preview{position:sticky;top:0}
.wizard-preview h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:12px}
.pw-live-card{border:1px solid var(--border-hard);border-radius:8px;overflow:hidden;background:var(--bg-panel)}
.pw-card-inner{display:flex;flex-direction:column}
.pw-card-img{aspect-ratio:3/4;background:var(--bg-panel);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pw-card-img img{width:100%;height:100%;object-fit:cover}
.pw-card-empty{color:var(--muted);font-size:11px;padding:20px}
.pw-card-body{padding:12px;font-size:11px}
.pw-card-body strong{display:block;font-size:13px;margin-bottom:6px;color:var(--gold)}
.pw-card-body p{color:var(--text-body);margin:0 0 8px;line-height:1.4}
.pw-card-price{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px}
.pw-card-sizes{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.pw-card-sizes span{font-size:9px;padding:2px 6px;border:1px solid var(--border);border-radius:3px}
.pw-card-colors{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.pw-dot{width:16px;height:16px;border-radius:50%;display:inline-block}
.pw-dot.border-swatch{box-shadow:0 0 0 1px var(--border-hard)}
.pw-variant-count{font-size:9px;color:var(--text-body);margin:0}
.drive-info{margin-top:16px;font-size:10px;color:var(--text-body)}
.drive-info code{display:block;margin-top:6px;padding:8px;background:var(--seg-hover);border-radius:4px;font-size:9px;word-break:break-all}
.wizard-actions{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
@media(max-width:899px){.wizard-preview{position:static}}

/* Admin pro — produits & promotions */
.tabs-scroll{flex-wrap:wrap;max-width:100%}
.bulk-bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:12px 14px;margin-bottom:12px;background:rgba(189,160,97,.1);border:1px solid var(--gold);border-radius:4px;font-size:11px}
.bulk-bar span{font-weight:600;color:var(--gold-lt)}
.badge{display:inline-block;padding:3px 8px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-pub{background:var(--badge-pub-bg);color:var(--badge-pub-text);border:1px solid var(--badge-pub-border)}
.badge-sched{background:var(--badge-sched-bg);color:var(--badge-sched-text,var(--gold-lt));border:1px solid var(--gold)}
.badge-draft{background:var(--badge-draft-bg);color:var(--badge-draft-text,var(--muted));border:1px solid var(--border-hard)}
.prod-thumb{width:44px;height:44px;object-fit:cover;border-radius:4px;border:1px solid var(--border-hard);display:block}
.prod-thumb.empty{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);background:var(--thumb-empty-bg)}
.thumb-cell{width:52px}
.chk-cell{width:36px;text-align:center}
.chk-cell input{width:16px;height:16px;cursor:pointer}
.row-meta{font-size:9px;color:var(--text-body)}
.prod-table .actions{min-width:200px}
.prod-table .actions .btn-sm{margin-bottom:4px}
</style>
</head>
<body>
<div id="apiBanner" class="api-banner" style="display:none"></div>
<div id="app"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal-panel" id="modalBody"></div>
</div>

<div class="toast hide" id="toastEl"></div>

<script src="i18n.js"></script>
<script>
let _tt;
function toast(msg, type) {
  const el = document.getElementById('toastEl');
  if (!el) return;
  el.textContent = msg;
  el.className = 'toast ' + (type || 's');
  clearTimeout(_tt);
  _tt = setTimeout(function () { el.classList.add('hide'); }, 3200);
}
</script>
<script src="product-wizard.js"></script>
<script src="admin-pro.js"></script>
